<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modulo Profesores - Portal Academico UFV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f2f7f6; color: #1f2a33; }
    header { background: #0f766e; color: #ecfeff; padding: 18px 32px; }
    header h1 { font-size: 1.4rem; margin-bottom: 4px; }
    header p { color: #ccfbf1; font-size: 0.92rem; }
    header a { color: #99f6e4; font-size: 0.9rem; text-decoration: none; display: inline-block; margin-top: 8px; }
    .container { max-width: 1040px; margin: 28px auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 22px; }
    .metric, .card, .panel { background: white; border: 1px solid #d7e4e1; border-radius: 8px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
    .metric { padding: 16px; }
    .metric span { display: block; color: #5a6b75; font-size: 0.8rem; margin-bottom: 8px; }
    .metric strong { color: #0f766e; font-size: 1.7rem; }
    .card { padding: 22px; margin-bottom: 22px; }
    .panel { padding: 18px; margin-bottom: 22px; }
    h2 { font-size: 1.05rem; color: #0f766e; border-bottom: 2px solid #ccfbf1; padding-bottom: 8px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #ccfbf1; color: #0f766e; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #edf2f7; vertical-align: top; }
    tr:hover td { background: #f8fafc; }
    .msg { padding: 10px 14px; border-radius: 6px; background: #fee2e2; color: #991b1b; margin-bottom: 12px; font-size: 0.9rem; }
    .success { background: #dcfce7; color: #166534; }
    .empty { color: #64748b; font-style: italic; }
    .muted { color: #6b7280; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-row { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.85rem; color: #334155; }
    input, select { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    button { border: none; border-radius: 6px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0f766e; color: #ecfeff; }
    .btn-ghost { background: #e2e8f0; color: #0f172a; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      header { padding: 16px; }
      table { font-size: 0.82rem; }
      th, td { padding: 8px; }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Portal Academico UFV - Modulo Profesores</h1>
    <p>Alumno C · Upstream /profesores · Grupo DT</p>
    <a href="/">Volver al inicio</a>
  </header>

  <main class="container">
    <section class="grid">
      <div class="metric"><span>Profesores</span><strong id="total-profesores">-</strong></div>
      <div class="metric"><span>Departamentos</span><strong id="total-departamentos">-</strong></div>
      <div class="metric"><span>Especialidades</span><strong id="total-especialidades">-</strong></div>
    </section>

    <section class="panel">
      <h2>Alta de profesor</h2>
      <div id="msg-alta"></div>
      <form id="form-profesor" class="form-grid">
        <div class="form-row">
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" placeholder="Nombre completo" required />
        </div>
        <div class="form-row">
          <label for="apellido">Apellido</label>
          <input id="apellido" name="apellido" type="text" placeholder="Apellido" required />
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="correo@ufv.es" required />
        </div>
        <div class="form-row">
          <label for="departamento">Departamento</label>
          <input id="departamento" name="departamento" type="text" placeholder="Departamento" required />
        </div>
        <div class="form-row">
          <label for="especialidad">Especialidad</label>
          <input id="especialidad" name="especialidad" type="text" placeholder="Especialidad" required />
        </div>
      </form>
      <div class="actions">
        <button class="btn-primary" id="btn-guardar" type="button">Guardar profesor</button>
        <button class="btn-ghost" id="btn-limpiar" type="button">Limpiar</button>
      </div>
    </section>

    <section class="panel">
      <h2>Filtros</h2>
      <div class="form-grid">
        <div class="form-row">
          <label for="filtro-departamento">Departamento</label>
          <input id="filtro-departamento" type="text" placeholder="Filtrar por departamento" />
        </div>
        <div class="form-row">
          <label for="filtro-especialidad">Especialidad</label>
          <input id="filtro-especialidad" type="text" placeholder="Filtrar por especialidad" />
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-filtrar" type="button">Aplicar filtros</button>
        <button class="btn-ghost" id="btn-reset" type="button">Quitar filtros</button>
      </div>
    </section>

    <section class="card">
      <h2>Profesores registrados</h2>
      <div id="msg-profesores"></div>
      <table id="tabla-profesores">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Departamento</th>
            <th>Especialidad</th>
            <th>Fecha alta</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="6" class="empty">Cargando profesores...</td></tr></tbody>
      </table>
    </section>
  </main>

  <script>
    function setText(id, value) {
      document.getElementById(id).textContent = value ?? '-';
    }

    function formatDate(value) {
      if (!value) return '-';
      return new Date(value).toLocaleDateString('es-ES');
    }

    async function cargarResumen() {
      try {
        const res = await fetch('/profesores/resumen');
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Error al cargar resumen');
        setText('total-profesores', data.total_profesores);
        setText('total-departamentos', data.departamentos);
        setText('total-especialidades', data.especialidades);
      } catch (error) {
        setText('total-profesores', '-');
        setText('total-departamentos', '-');
        setText('total-especialidades', '-');
      }
    }

    function setFormMessage(targetId, message, isSuccess) {
      const node = document.getElementById(targetId);
      node.innerHTML = message ? `<div class="msg ${isSuccess ? 'success' : ''}">${message}</div>` : '';
    }

    function buildQuery() {
      const params = new URLSearchParams();
      const departamento = document.getElementById('filtro-departamento').value.trim();
      const especialidad = document.getElementById('filtro-especialidad').value.trim();
      if (departamento) params.set('departamento', departamento);
      if (especialidad) params.set('especialidad', especialidad);
      return params.toString();
    }

    async function cargarProfesores() {
      try {
        const query = buildQuery();
        const url = query ? `/profesores/lista?${query}` : '/profesores/lista';
        const res = await fetch(url);
        const data = await res.json();
        const tbody = document.querySelector('#tabla-profesores tbody');
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">No hay profesores con esos filtros.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map((item) => `
          <tr>
            <td>${item.id}</td>
            <td>${item.nombre || '-'}</td>
            <td>${item.email || '-'}</td>
            <td>${item.departamento || '-'}</td>
            <td>${item.especialidad || '-'}</td>
            <td>${formatDate(item.fecha_alta)}</td>
          </tr>
        `).join('');
      } catch (error) {
        document.getElementById('msg-profesores').innerHTML = '<div class="msg">Error al cargar profesores: ' + error.message + '</div>';
      }
    }

    async function crearProfesor() {
      try {
        const payload = {
          nombre: document.getElementById('nombre').value.trim(),
          apellido: document.getElementById('apellido').value.trim(),
          email: document.getElementById('email').value.trim(),
          departamento: document.getElementById('departamento').value.trim(),
          especialidad: document.getElementById('especialidad').value.trim(),
        };

        if (!payload.nombre || !payload.apellido || !payload.email || !payload.departamento || !payload.especialidad) {
          setFormMessage('msg-alta', 'Completa todos los campos para dar de alta un profesor.', false);
          return;
        }

        const res = await fetch('/profesores/nuevo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Error al crear profesor');

        setFormMessage('msg-alta', 'Profesor creado con ID ' + data.id + '.', true);
        document.getElementById('form-profesor').reset();
        await cargarResumen();
        await cargarProfesores();
      } catch (error) {
        setFormMessage('msg-alta', error.message, false);
      }
    }

    document.getElementById('btn-guardar').addEventListener('click', crearProfesor);
    document.getElementById('btn-limpiar').addEventListener('click', () => {
      document.getElementById('form-profesor').reset();
      setFormMessage('msg-alta', '', false);
    });
    document.getElementById('btn-filtrar').addEventListener('click', cargarProfesores);
    document.getElementById('btn-reset').addEventListener('click', () => {
      document.getElementById('filtro-departamento').value = '';
      document.getElementById('filtro-especialidad').value = '';
      cargarProfesores();
    });

    cargarResumen();
    cargarProfesores();
  </script>
</body>
</html>
