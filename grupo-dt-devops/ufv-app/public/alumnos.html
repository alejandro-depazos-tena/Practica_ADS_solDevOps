<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Módulo Alumnos - Portal Académico UFV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
    header { background: #1a73e8; color: white; padding: 16px 32px; }
    header h1 { font-size: 1.4rem; }
    header a { color: #cce0ff; font-size: 0.9rem; text-decoration: none; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h2 { font-size: 1.1rem; margin-bottom: 16px; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #e8f0fe; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }
    .btn { background: #1a73e8; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn:hover { background: #1558b0; }
    .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.85rem; font-weight: bold; color: #555; }
    input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; min-width: 160px; }
    .msg { padding: 10px 16px; border-radius: 4px; margin-bottom: 12px; font-size: 0.9rem; }
    .msg.ok { background: #e6f4ea; color: #2d7d46; }
    .msg.err { background: #fce8e6; color: #c5221f; }
    .empty { color: #888; font-style: italic; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>Portal Académico UFV — Módulo Alumnos</h1>
    <a href="/">← Volver al inicio</a>
  </header>

  <div class="container">

    <div class="card">
      <h2>Lista de Alumnos</h2>
      <div id="msg-alumnos"></div>
      <table id="tabla-alumnos">
        <thead><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Carrera</th><th>Curso</th><th>Registro</th></tr></thead>
        <tbody><tr><td colspan="7" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Buscar Alumno</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="filtro-carrera">Carrera</label>
          <input type="text" id="filtro-carrera" placeholder="Ej: Informática" />
        </div>
        <div class="form-group">
          <label for="filtro-curso">Curso</label>
          <input type="text" id="filtro-curso" placeholder="Ej: 3" />
        </div>
        <button class="btn" onclick="buscar()">Buscar</button>
        <button class="btn" style="background:#888" onclick="cargarAlumnos()">Ver todos</button>
      </div>
      <div id="msg-buscar"></div>
      <table id="tabla-buscar" style="display:none">
        <thead><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Carrera</th><th>Curso</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Registrar Nuevo Alumno</h2>
      <div id="msg-nuevo"></div>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input type="text" id="nuevo-nombre" /></div>
        <div class="form-group"><label>Apellido</label><input type="text" id="nuevo-apellido" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="nuevo-email" /></div>
        <div class="form-group"><label>Carrera</label><input type="text" id="nuevo-carrera" /></div>
        <div class="form-group"><label>Curso</label><input type="number" id="nuevo-curso" min="1" max="5" /></div>
        <button class="btn" onclick="registrar()">Registrar</button>
      </div>
    </div>

  </div>

  <script>
    async function cargarAlumnos() {
      try {
        const res = await fetch('/alumnos/lista');
        const data = await res.json();
        const tbody = document.querySelector('#tabla-alumnos tbody');
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty">No hay alumnos registrados.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(a => `
          <tr>
            <td>${a.id}</td>
            <td>${a.nombre}</td>
            <td>${a.apellido}</td>
            <td>${a.email}</td>
            <td>${a.carrera || '-'}</td>
            <td>${a.curso || '-'}</td>
            <td>${a.fecha_registro ? new Date(a.fecha_registro).toLocaleDateString('es-ES') : '-'}</td>
          </tr>`).join('');
      } catch (e) {
        document.getElementById('msg-alumnos').innerHTML = '<div class="msg err">Error al cargar alumnos: ' + e.message + '</div>';
      }
    }

    async function buscar() {
      const carrera = document.getElementById('filtro-carrera').value;
      const curso = document.getElementById('filtro-curso').value;
      const params = new URLSearchParams();
      if (carrera) params.append('carrera', carrera);
      if (curso) params.append('curso', curso);
      try {
        const res = await fetch('/alumnos/buscar?' + params.toString());
        const data = await res.json();
        const tabla = document.getElementById('tabla-buscar');
        const tbody = tabla.querySelector('tbody');
        tabla.style.display = 'table';
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">No se encontraron alumnos.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(a => `
          <tr>
            <td>${a.id}</td><td>${a.nombre}</td><td>${a.apellido}</td>
            <td>${a.email}</td><td>${a.carrera || '-'}</td><td>${a.curso || '-'}</td>
          </tr>`).join('');
      } catch (e) {
        document.getElementById('msg-buscar').innerHTML = '<div class="msg err">Error al buscar.</div>';
      }
    }

    async function registrar() {
      const body = {
        nombre: document.getElementById('nuevo-nombre').value,
        apellido: document.getElementById('nuevo-apellido').value,
        email: document.getElementById('nuevo-email').value,
        carrera: document.getElementById('nuevo-carrera').value,
        curso: document.getElementById('nuevo-curso').value
      };
      const msgEl = document.getElementById('msg-nuevo');
      if (!body.nombre || !body.apellido || !body.email) {
        msgEl.innerHTML = '<div class="msg err">Nombre, apellido y email son obligatorios.</div>';
        return;
      }
      try {
        const res = await fetch('/alumnos/nuevo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
          msgEl.innerHTML = '<div class="msg ok">Alumno registrado correctamente (ID: ' + data.id + ').</div>';
          cargarAlumnos();
        } else {
          msgEl.innerHTML = '<div class="msg err">' + data.message + '</div>';
        }
      } catch (e) {
        msgEl.innerHTML = '<div class="msg err">Error al registrar.</div>';
      }
    }

    cargarAlumnos();
  </script>
</body>
</html>
